name: CI - Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.11"

jobs:
 
  # DJANGO APP: lint + test
 
  django:
    name: Django App - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django_app
    env:
      DJANGO_SETTINGS_MODULE: "core.settings"
      SECRET_KEY: "ci-test-secret-key-not-for-prod"
      JWT_SECRET_KEY: "ci-test-jwt-secret-not-for-prod"
      DEBUG: "False"
      DATABASE_URL: "postgresql://ci_user:ci_password@localhost:5432/ci_test_db"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci_user -d ci_test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: django_app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov ruff black isort psycopg2-binary

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Check import order with isort
        run: isort --check-only .

      - name: Run Django system checks
        run: python manage.py check

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing


  # FASTAPI APP: lint + test
 
  fastapi:
    name: FastAPI App - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi_app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: fastapi_app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-cov ruff black isort

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Check import order with isort
        run: isort --check-only .

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing


  # AIRFLOW DAGs: just validate they import cleanly
 
  airflow-dags:
    name: Validate Airflow DAGs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Check DAG files compile
        run: |
          python -c "
          import sys, py_compile, glob
          errors = []
          for f in glob.glob('airflow/dags/**/*.py', recursive=True):
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('All DAG files compiled successfully.')
          "